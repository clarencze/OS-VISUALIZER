<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - OS History</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="/css/register.css">
    <script type="module" src="/jscripts/register.js" defer></script>
</head>
<body>
    <video autoplay loop muted playsinline class="bg-video">
        <source src="/visuals/background.mp4" type="video/mp4">
    </video>

    <div class="overlay"></div>

    <div class="container-main">
        <div class="logo-section">
            <a href="/htmls/index.html" class="logo-link">
                <i class="fas fa-server"></i>
                <span>OS History</span>
            </a>
        </div>

        <div class="register-box">
            <div class="register-header">
                <h1 class="register-title">Create Account</h1>
                <p class="register-subtitle">Join our community and explore OS history</p>
            </div>

            <form class="register-form" id="registrationForm">
                <p id="error-msg" style="color:red;text-align:center;"></p>

                <div class="input-group">
                    <label for="fullname" class="input-label">
                        <i class="fas fa-user"></i> Full Name
                    </label>
                    <input type="text" id="fullname" class="input-field" placeholder="John Doe" required>
                    <span class="input-error"></span>
                </div>

                <div class="input-group">
                    <label for="email" class="input-label">
                        <i class="fas fa-envelope"></i> Email Address
                    </label>
                    <input type="email" id="email" class="input-field" placeholder="your@email.com" required>
                    <span class="input-error"></span>
                </div>

                <div class="input-group">
                    <label for="password" class="input-label">
                        <i class="fas fa-lock"></i> Password
                    </label>
                    <div class="password-wrapper">
                        <input type="password" id="password" class="input-field" placeholder="••••••••" required>
                        <button type="button" class="password-toggle" aria-label="Toggle password">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <span class="input-error"></span>
                    <div class="password-strength">
                        <div class="strength-bar"></div>
                        <span class="strength-text">Password strength</span>
                    </div>
                </div>

                <div class="input-group">
                    <label for="confirm-password" class="input-label">
                        <i class="fas fa-lock"></i> Confirm Password
                    </label>
                    <div class="password-wrapper">
                        <input type="password" id="confirm-password" class="input-field" placeholder="••••••••" required>
                        <button type="button" class="password-toggle" aria-label="Toggle password">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <span class="input-error"></span>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="terms" required>
                    <label for="terms" class="checkbox-label">
                        I agree to the <a href="#" id="openTerms" class="link">Terms of Service</a> and <a href="#" class="link">Privacy Policy</a>
                    </label>
                </div>

                <button type="submit" class="register-btn" id="submit">
                    <span>Create Account</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>

            <div class="auth-footer">
                <p class="auth-text">
                    Already have an account? 
                    <a href="/htmls/login.html" class="auth-link">Sign In</a>
                </p>
            </div>

            <div class="back-link">
                <a href="/htmls/index.html" class="back-btn">
                    <i class="fas fa-arrow-left"></i> Back to Home
                </a>
            </div>
        </div>
    </div>

    <!-- Terms Modal -->
    <div id="termsModal" class="modal" style="display:none;">
        <div class="modal-content">
            <span id="closeTerms" class="close">&times;</span>
            <h2>Terms and Conditions</h2>
            <pre>
Last Updated: 2025

By accessing OS History, you agree to these terms...
            </pre>
        </div>
    </div>

</body>
</html>
