<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Forgot Password — OS Visualizer</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="icon" href="/public/visuals/OS.png">
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/login.css" />
  <script type="module" src="../jscripts/forgot-password.js" defer></script>
</head>
<body>
  <!-- Background Video -->
  <video autoplay loop muted playsinline class="bg-video">
    <source src="../visuals/background.mp4" type="video/mp4">
  </video>

  <div class="overlay"></div>

  <main style="min-height:80vh; display:flex; align-items:center; justify-content:center; padding:24px; position:relative; z-index:5;">
    <div style="max-width:480px; width:100%; background:rgba(12,17,20,0.85); padding:24px; border-radius:12px; border:1px solid rgba(255,255,255,0.06);">
      <h2>Forgot Password</h2>
      <p style="color:var(--text-muted)">Enter your email and we'll generate a reset link.</p>

      <div style="margin-top:12px;">
        <input id="fp-email" type="email" placeholder="your@email.com" style="width:100%; padding:8px; border-radius:6px;" />
        <div style="height:12px;"></div>
        <button id="fp-send" class="btn btn-primary">Send Reset Link</button>
        <button id="fp-back" class="btn btn-danger" style="margin-left:8px;">Back to Login</button>
        <p id="fp-message" style="margin-top:12px; color:var(--text);"></p>
      </div>
    </div>
  </main>

</body>
</html>
